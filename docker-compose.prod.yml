services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-clearvote}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-clearvote}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-clearvote}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://${DB_USER:-clearvote}:${DB_PASSWORD}@db:5432/${DB_NAME:-clearvote}?schema=public"
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      PORT: "3000"
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-resend}
      SMTP_FROM: ${SMTP_FROM:-ClearVote <no-reply@clearvote.app>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
