services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clearvote
      POSTGRES_PASSWORD: clearvote
      POSTGRES_DB: clearvote
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearvote"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://clearvote:clearvote@db:5432/clearvote?schema=public"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production}"
      PORT: "3000"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      RESEND_API_KEY: "${RESEND_API_KEY:-}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:-resend}"
      SMTP_FROM: "${SMTP_FROM:-Clearvote <no-reply@clearvote.app>}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
