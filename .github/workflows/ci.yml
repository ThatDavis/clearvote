name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # v4.2.2
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install pnpm
        # v4.1.0
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 9

      - name: Setup Node.js
        # v4.3.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          AUTH_SECRET: dummy-build-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Cache Trivy vulnerability DB
        # v5.0.5
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-trivy-db-

      - name: Run Trivy vulnerability scanner (filesystem)
        id: trivy-fs
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          skip-files: 'pnpm-lock.yaml'

      - name: Build Docker image for scanning
        id: docker-build
        run: docker build -t clearvote:scan .
        env:
          DOCKER_BUILDKIT: 1

      - name: Run Trivy vulnerability scanner (container)
        id: trivy-image
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: 'clearvote:scan'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'
          skip-dirs: '/root/.npm,/root/.cache'
          scanners: 'vuln'

      - name: Upload Trivy scan results
        # v4.36.2
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        if: steps.trivy-fs.outcome == 'success' || steps.trivy-fs.outcome == 'failure'
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-fs'

      - name: Upload Trivy image scan results
        # v4.36.2
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        if: steps.trivy-image.outcome == 'success' || steps.trivy-image.outcome == 'failure'
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'trivy-image'
